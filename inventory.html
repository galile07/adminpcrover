<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCROVER Inventory Management</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-dashboard">
  <div class="layout-shell">
    <aside class="sidebar">
      <div class="login-brand">
        <div class="brand-mark">PC</div>
        <div>
          <span class="brand-title">ROVER</span>
          <span class="brand-sub">BALIUAG</span>
        </div>
      </div>
      <nav class="nav-links">
        <a href="dashboard.html" class="nav-link"><span>Dashboard</span></a>
        <a href="pos.html" class="nav-link"><span>POS System</span></a>
        <a href="orders.html" class="nav-link"><span>Online Orders</span></a>
        <a href="inventory.html" class="nav-link active"><span>Inventory</span></a>
        <a href="automation.html" class="nav-link"><span>Price Automation</span></a>
      </nav>
    </aside>
    <main class="main-content">
      <header class="header">
        <div class="header-info">Inventory</div>
        <button class="btn btn-secondary" onclick="location.href='index.html'">Log out</button>
      </header>
      <section class="page-content">
        <div class="section-heading">
          <h2>Products</h2>
          <button class="btn btn-primary" onclick="openAddProductModal()">Add Product</button>
        </div>
        <div class="card table-card">
          <table>
            <thead>
              <tr>
                <th>Image</th>
                <th>Product</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Status</th>
                <th style="width:140px;text-align:center;">Action</th>
              </tr>
            </thead>
            <tbody id="inventoryTableBody"></tbody>
          </table>
        </div>
      </section>

      <div id="productModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
          <div class="modal-header">
            <h3 id="productModalTitle">Add Product</h3>
            <button class="modal-close" onclick="closeProductModal()">&times;</button>
          </div>
          <div class="modal-body">
            <form id="productForm" autocomplete="off">
              <input type="hidden" id="editProductId">
              <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="productName" class="form-input" required>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Price (₱)</label>
                  <input type="number" id="productPrice" class="form-input" required min="0">
                </div>
                <div class="form-group">
                  <label>Stock</label>
                  <input type="number" id="productStock" class="form-input" required min="0">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Low Stock Threshold</label>
                  <input type="number" id="productThreshold" class="form-input" required min="0">
                </div>
                <div class="form-group" style="justify-content:flex-end;">
                  <label class="toggle-label">
                    <input type="checkbox" id="productEnabled" checked>
                    <span class="toggle-slider"></span>
                    <span class="toggle-text">Active</span>
                  </label>
                </div>
              </div>
              <div class="form-group">
                <label>Product Image</label>
                <input type="file" id="productImage" class="form-input" accept="image/*" onchange="previewImage(event)">
                <div id="imagePreview" class="image-preview"></div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeProductModal()" style="color:#555;border:1px solid #ccc;background:transparent;padding:10px 24px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;">Cancel</button>
            <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
          </div>
        </div>
      </div>

    </main>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/script.js"></script>
</body>
</html>
