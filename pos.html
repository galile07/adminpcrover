<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCROVER POS</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="layout-shell">
    <aside class="sidebar">
      <div class="login-brand">
        <div class="brand-mark">PC</div>
        <div>
          <span class="brand-title">ROVER</span>
          <span class="brand-sub">BALIUAG</span>
        </div>
      </div>
      <nav class="nav-links">
        <a href="dashboard.html" class="nav-link"><span>Dashboard</span></a>
        <a href="pos.html" class="nav-link active"><span>POS System</span></a>
        <a href="orders.html" class="nav-link"><span>Online Orders</span></a>
        <a href="inventory.html" class="nav-link"><span>Inventory</span></a>
        <a href="automation.html" class="nav-link"><span>Price Automation</span></a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="header">
        <div class="header-info">POS System</div>
        <button class="btn btn-secondary" onclick="location.href='index.html'">Log out</button>
      </header>
      <section class="page-content">
        <div class="pos-layout">
          <div class="pos-products-section">
            <div class="pos-search-bar">
              <input type="text" id="posSearchInput" placeholder="Search products..." />
              <span class="pos-search-icon">🔍</span>
            </div>
            <div class="pos-grid"></div>
          </div>
          <div class="pos-cart-section">
            <div class="pos-cart-header">Current Order</div>
            <div class="pos-cart-list"></div>
            <div class="pos-cart-summary">
              <div class="pos-summary-row"><span>Subtotal</span><span>₱0.00</span></div>
              <div class="pos-summary-total"><span>Total</span><span>₱0.00</span></div>
              <button class="btn-primary btn-checkout">Pay Out ₱0.00</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Cash payment modal -->
  <div id="cashModal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:380px;">
      <div class="modal-header">
        <h3>Cash Payment</h3>
        <button class="modal-close" onclick="closeCashModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Total Amount</label>
          <p id="cashTotalDisplay" style="font-size:24px;font-weight:700;color:var(--pc-blue);margin:4px 0 16px;"></p>
        </div>
        <div class="form-group">
          <label>Amount Received (₱)</label>
          <input type="number" id="cashReceived" class="form-input" placeholder="Enter cash amount" min="0" step="0.01">
        </div>
        <div class="form-group" id="cashChangeGroup" style="display:none;">
          <label>Change</label>
          <p id="cashChangeDisplay" style="font-size:20px;font-weight:700;color:var(--pc-orange);margin:4px 0 0;"></p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCashModal()" style="color:#555;border:1px solid #ccc;background:transparent;padding:10px 24px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;">Cancel</button>
        <button class="btn btn-primary" id="cashConfirmBtn" onclick="confirmCashPayment()">Complete Payment</button>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/script.js"></script>
</body>
</html>
