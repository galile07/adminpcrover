<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCROVER Online Orders</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-dashboard">
  <div class="layout-shell">
    <aside class="sidebar">
      <div class="login-brand">
        <div class="brand-mark">PC</div>
        <div>
          <span class="brand-title">ROVER</span>
          <span class="brand-sub">BALIUAG</span>
        </div>
      </div>
      <nav class="nav-links">
        <a href="dashboard.html" class="nav-link"><span>Dashboard</span></a>
        <a href="pos.html" class="nav-link"><span>POS System</span></a>
        <a href="orders.html" class="nav-link active"><span>Online Orders</span></a>
        <a href="inventory.html" class="nav-link"><span>Inventory</span></a>
        <a href="automation.html" class="nav-link"><span>Price Automation</span></a>
      </nav>
    </aside>
    <main class="main-content">
      <header class="header">
        <div class="header-info">Online Orders</div>
        <button class="btn btn-secondary" onclick="location.href='index.html'">Log out</button>
      </header>
      
      <nav class="sub-nav">
        <button class="sub-nav-item active" data-status="pending">To Accept</button>
        <button class="sub-nav-item" data-status="shipped">To Deliver</button>
        <button class="sub-nav-item" data-status="delivered">To Finish</button>
      </nav>

      <section class="page-content">
        <div id="ordersContainer" class="orders-container"></div>
      </section>

      <div id="orderModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
          <div class="modal-header">
            <h3>Order Information</h3>
            <button class="modal-close" onclick="closeOrderModal()">&times;</button>
          </div>
          <div class="modal-body" id="modalBody"></div>
          <div class="modal-footer" id="modalFooter"></div>
        </div>
      </div>


    </main>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/script.js"></script>
</body>
</html>
